---
deployment:
  tasks:
    - export DEPLOYPATH=/home2/dmdro/public_html
    - /bin/cp -f *.html $DEPLOYPATH/
    - /bin/cp -f *.php $DEPLOYPATH/
    - /bin/cp -f *.txt $DEPLOYPATH/
    - /bin/cp -f *.xml $DEPLOYPATH/
    - /bin/cp -f .htaccess $DEPLOYPATH/
    - /bin/cp -Rf js $DEPLOYPATH/
    - /bin/cp -Rf assets $DEPLOYPATH/
